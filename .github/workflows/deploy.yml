name: Remote Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd my-project
            git pull origin main
            docker build -t my-site:latest .
            docker rm -f my-custom-app || true
            docker run -d -p 80:80 --name my-custom-app my-site:latest
